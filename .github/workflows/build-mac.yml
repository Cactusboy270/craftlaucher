name: Build macOS

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build macOS arm64
        run: npx electron-builder --mac dmg --arm64 --publish never

      - name: Build macOS x64
        run: npx electron-builder --mac dmg --x64 --publish never

      - name: Upload DMGs
        uses: actions/upload-artifact@v4
        with:
          name: craftlauncher-macos
          path: dist/*.dmg
